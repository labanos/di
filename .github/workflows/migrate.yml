name: Run DB Migration

# Trigger manually from GitHub Actions UI
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Run SQL migrations via SSH + MySQL
        env:
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          for sql_file in \
            migrate/sql/00_schema.sql \
            migrate/sql/01_setup.sql \
            migrate/sql/02_results_2019.sql \
            migrate/sql/02_results_2020.sql \
            migrate/sql/02_results_2021.sql \
            migrate/sql/02_results_2022.sql \
            migrate/sql/02_results_2023.sql \
            migrate/sql/02_results_2024.sql \
            migrate/sql/02_results_2025.sql; do
            echo "Running: $sql_file"
            sshpass -p "${SFTP_PASS}" ssh \
              -p "${SFTP_PORT}" \
              -o StrictHostKeyChecking=no \
              -o BatchMode=no \
              "${SFTP_USER}@${SFTP_HOST}" \
              "mysql -h ${DB_HOST} -u ${DB_USER} -p${DB_PASS} ${DB_NAME}" \
              < "${sql_file}"
            echo "Done: $sql_file"
          done
          echo "All migrations complete!"
